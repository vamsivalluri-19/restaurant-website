version: '3.8'

services:
  server:
    build: ./server
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://localhost:27017/pakka-military-hotel
      - JWT_SECRET=supersecretjwtkeyforpakkamilitaryhotel123
      - JWT_REFRESH_SECRET=supersecretrefreshjwtkeyforpakkamilitaryhotel456
    restart: always

  client:
    build: ./client
    ports:
      - '3001:80'
    depends_on:
      - server
    restart: always
